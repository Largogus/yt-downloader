<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Скачать видео из Youtube и Pinterest</title>
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>

    <div class="card" id="name"><p id="text">Скачать видео из Youtube и Pinterest</p></div>
    <main class="content">
        <input type="url" id="inp_url" class="inp" placeholder="Вставьте ссылку из Youtube или Pinterest">
        <button id='dwn' class="btn">Скачать</button>

        <div class="combo">
            <div class="combo-selected">
                <span id="formatText">MP4 1080p</span>
                <div class="combo-arrow">⌄</div>
            </div>
            <div class="combo-list">
                <div class="combo-item active">MP4 1080p</div>
                <div class="combo-item">MP4 720p</div>
                <div class="combo-item">MP4 480p</div>
                <div class="combo-item">MP4 360p</div>
                <div class="combo-item">MP4 240p</div>
                <div class="combo-item">MP4 144p</div>
            </div>
        </div>
        <p class="sidetext" link="https://t.me/m/9zGeihYdYWJi" style="margin: 0 auto; cursor: pointer;" target="_blank">Нужна помощь?</p>
    </main>
    <br>
    <footer>
        <div style="display: flex; justify-content: center; align-content: center; ">
            <button id='sett' class="btn">Настройки</button>
            <button id='rept' link="https://forms.gle/RmKioSRnKPtw5M467" class="btn">Репорт</button>
        </div>
    </footer>

    <div class="modal" id="modal">
        <div class="modal-card">
            <div class="modal-title">Скачивание началось</div>
            <div id="toast" class="toast">Скопировано</div>
            <div class="sidetext" id="side-title" style="display: none;"></div>

            <div class="loader">
                <div class="loader-bar"></div>
            </div>

            <div class="modal-footer">
                <p class="sidetext" link="https://t.me/LargenEXE" target="_blank" style="margin: 0 auto; cursor: pointer;">
                    📢 Больше проектов в Telegram
                </p>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="/eel.js"></script>
    <script src="code.js"></script>
</body>
</html>
